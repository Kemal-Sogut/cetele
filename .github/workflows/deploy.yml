name: Deploy to Hostinger

on:
  push:
    branches:
      - main  # Or your specific branch name

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🛠️ Install and Build
      # This step assumes you are using NPM. Skip if your dist is pre-built.
      run: |
        npm install
        npm run build

    - name: 📂 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/  # The folder you want to upload
        server-dir: ./public_html/ # The destination on Hostinger
